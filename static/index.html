<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Banking Ledger</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 21h18"></path>
                    <path d="M3 10h18"></path>
                    <path d="M5 6l7-3 7 3"></path>
                    <path d="M4 10v11"></path>
                    <path d="M20 10v11"></path>
                    <path d="M8 14v3"></path>
                    <path d="M12 14v3"></path>
                    <path d="M16 14v3"></path>
                </svg>
                Core Banking Ledger
            </h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="theme-toggle" onclick="toggleTheme()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0;" title="Сменить тему">🌙</button>
                <span id="current-username" style="font-weight: 600; color: #475569;"></span>
                <button class="add-account-btn" onclick="openModal()">+ Открыть новый счет</button>
                <button class="cancel-btn" onclick="logout()">Выйти</button>
            </div>
        </header>

        <section>
            <h2>Ваши счета</h2>
            <div id="accounts-list" class="accounts-grid">
                <!-- Сюда JS вставит карточки -->
            </div>
        </section>

        <section class="transfer-section">
            <h2>Быстрый перевод</h2>
            <div class="transfer-card">
                <input type="number" id="from-id" placeholder="ID отправителя">
                <input type="number" id="to-id" placeholder="ID получателя">
                <input type="number" id="amount" placeholder="Сумма">
                <button onclick="makeTransfer()">Отправить деньги</button>
            </div>
        </section>
    </div>

    <!-- Всплывающее окно -->
    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Открытие нового счета</h3>
            <p>Введите имя и фамилию владельца:</p>
            <input type="text" id="new-owner-name" placeholder="Ivan Ivanov">
            <div class="modal-actions">
                <button onclick="closeModal()" class="cancel-btn">Отмена</button>
                <button onclick="createAccount()" class="confirm-btn">Создать счет</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно истории -->
<div id="history-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 600px;">
        <h3>История операций</h3>
        <div id="history-content" style="max-height: 400px; overflow-y: auto; margin: 20px 0;">
            <!-- Сюда JS вставит таблицу -->
        </div>
        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeHistory()">Закрыть</button>
        </div>
    </div>
</div>

    <script src="/static/script.js"></script>
</body>
</html>
